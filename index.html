<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Representantes Globais</title>
    <meta name="description" content="Mapa interativo de representantes globais por país">

    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>



    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            outline: none !important;
        }

        body,
        html {
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overflow: hidden;
        }

        #app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #1e40af 50%, #2563eb 100%);
            padding: 1rem 1.5rem;
            box-shadow: 0 4px 20px rgba(30, 64, 175, 0.3);
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #60a5fa, #3b82f6, #2563eb, #3b82f6, #60a5fa);
            background-size: 200% 100%;
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 200% 0; }
            50% { background-position: -200% 0; }
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.15);
        }

        .header p {
            margin: 0.25rem 0 0 0;
            font-size: 0.85rem;
            color: rgba(191, 219, 254, 0.9);
            font-weight: 400;
        }

        @media (min-width: 640px) {
            .header {
                padding: 1.25rem 2rem;
            }
            .header h1 {
                font-size: 1.75rem;
            }
            .header p {
                font-size: 0.9rem;
            }
        }

        @media (min-width: 1024px) {
            .header {
                padding: 1.5rem 3rem;
            }
            .header h1 {
                font-size: 2rem;
            }
        }

        /* Map */
        .map-area {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        #map {
            height: 100%;
            width: 100%;
            background-color: #e8f0fe;
        }

        /* Custom tooltip */
        .country-tooltip {
            background-color: rgba(15, 23, 42, 0.92);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            letter-spacing: 0.01em;
            backdrop-filter: blur(4px);
        }

        .country-tooltip::before {
            border-top-color: rgba(15, 23, 42, 0.92) !important;
        }

        /* Leaflet controls styling */
        .leaflet-control-zoom a {
            color: #1e40af !important;
            font-weight: 600;
        }

        .leaflet-control-zoom a:hover {
            background-color: #eff6ff !important;
        }

        .leaflet-interactive {
            transition: fill-opacity 0.2s ease-in-out, stroke-width 0.15s ease;
        }

        /* Reset zoom button */
        .reset-zoom-btn {
            position: absolute;
            bottom: 28px;
            right: 14px;
            z-index: 1000;
            background: white;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 6px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .reset-zoom-btn:hover {
            background: #eff6ff;
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }

        .reset-zoom-btn svg {
            width: 18px;
            height: 18px;
            color: #1e40af;
        }

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(248, 250, 252, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #dbeafe;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 1rem;
            color: #64748b;
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* Error state */
        .error-message {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fef2f2;
            z-index: 1000;
        }

        .error-message p {
            color: #991b1b;
            font-weight: 500;
        }

        .error-message button {
            margin-top: 1rem;
            padding: 0.5rem 1.5rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .error-message button:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div id="app-container">
        <!-- Header -->
        <header class="header">
            <h1>Representantes Globais</h1>
            <p>Selecione um país para ver os detalhes</p>
        </header>

        <!-- Map -->
        <div class="map-area">
            <div id="map"></div>

            <!-- Reset Zoom -->
            <button id="reset-zoom-btn" class="reset-zoom-btn" title="Resetar zoom">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 9V4.5M9 9H4.5M9 9 3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5 5.25 5.25" />
                </svg>
            </button>

            <!-- Loading Overlay -->
            <div id="loading-overlay" class="loading-overlay">
                <div class="loading-spinner"></div>
                <p class="loading-text">Carregando mapa mundial...</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {

            // ── CONFIG ──────────────────────────────────────────────
            // Natural Earth 110m GeoJSON — properly pre-split at antimeridian (Russia, Fiji, etc.)
            // This dataset includes NAME_PT (Portuguese) for most countries
            const GEOJSON_URL = 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson';

            // ── MAP STYLES ──────────────────────────────────────────
            const defaultStyle = {
                fillColor: '#3b82f6',
                weight: 1,
                opacity: 1,
                color: '#ffffff',
                fillOpacity: 0.7
            };

            const highlightStyle = {
                weight: 2,
                color: '#1e40af',
                fillOpacity: 0.9,
                fillColor: '#2563eb'
            };

            const selectedStyle = {
                fillColor: '#1d4ed8',
                weight: 2.5,
                color: '#1e3a5f',
                fillOpacity: 0.95
            };

            // ── STATE ───────────────────────────────────────────────
            let geoJsonLayer = null;
            let selectedLayer = null;
            const loadingOverlay = document.getElementById('loading-overlay');

            // ── INIT MAP ────────────────────────────────────────────
            const southWest = L.latLng(-85, -180);
            const northEast = L.latLng(85, 180);
            const worldBounds = L.latLngBounds(southWest, northEast);

            const map = L.map('map', {
                center: [20, 0],
                zoom: 2,
                minZoom: 2,
                maxZoom: 8,
                zoomControl: true,
                attributionControl: true,
                worldCopyJump: false,
                maxBounds: worldBounds,
                maxBoundsViscosity: 1.0
            });

            // Tile layer — clean light style, no labels for a sleeker look
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
                subdomains: 'abcd',
                maxZoom: 19,
                noWrap: true
            }).addTo(map);

            // ── HELPERS ─────────────────────────────────────────────
            // Natural Earth includes NAME_PT for most countries;
            // this fallback map covers entries where NAME_PT may be missing or uses the English NAME
            const ptFallback = {
                'W. Sahara': 'Saara Ocidental', 'Dem. Rep. Congo': 'Rep. Dem. do Congo',
                'Dominican Rep.': 'República Dominicana', 'Falkland Is.': 'Ilhas Malvinas',
                'Fr. S. Antarctic Lands': 'Terras Austrais Francesas',
                'Bosnia and Herz.': 'Bósnia e Herzegovina', 'N. Cyprus': 'Chipre do Norte',
                'Somaliland': 'Somalilândia', 'Kosovo': 'Kosovo', 'S. Sudan': 'Sudão do Sul',
                'Central African Rep.': 'Rep. Centro-Africana', 'Eq. Guinea': 'Guiné Equatorial',
                'eSwatini': 'Eswatini', 'Solomon Is.': 'Ilhas Salomão',
                'N. Korea': 'Coreia do Norte', 'S. Korea': 'Coreia do Sul',
                'United States of America': 'Estados Unidos'
            };

            function getDisplayName(properties) {
                // 1. Use NAME_PT from Natural Earth (built-in Portuguese)
                if (properties.NAME_PT) return properties.NAME_PT;
                // 2. Try fallback dictionary by NAME
                const name = properties.NAME || properties.name || properties.ADMIN || 'Desconhecido';
                return ptFallback[name] || name;
            }

            function onEachFeature(feature, layer) {
                const name = getDisplayName(feature.properties);

                // Tooltip
                layer.bindTooltip(name, {
                    sticky: true,
                    className: 'country-tooltip',
                    direction: 'top',
                    offset: [0, -10]
                });

                // Events
                layer.on({
                    mouseover: function (e) {
                        const l = e.target;
                        if (l !== selectedLayer) {
                            l.setStyle(highlightStyle);
                            l.bringToFront();
                            if (selectedLayer) selectedLayer.bringToFront();
                        }
                    },
                    mouseout: function (e) {
                        const l = e.target;
                        if (l !== selectedLayer) {
                            geoJsonLayer.resetStyle(l);
                        }
                    },
                    click: function (e) {
                        const l = e.target;

                        // Deselect previous
                        if (selectedLayer && selectedLayer !== l) {
                            geoJsonLayer.resetStyle(selectedLayer);
                        }

                        if (selectedLayer === l) {
                            // Toggle off
                            geoJsonLayer.resetStyle(l);
                            selectedLayer = null;
                            map.setView([20, 0], 2);
                        } else {
                            // Select
                            selectedLayer = l;
                            l.setStyle(selectedStyle);
                            l.bringToFront();
                            map.fitBounds(l.getBounds(), { padding: [40, 40], maxZoom: 6 });
                        }
                    }
                });
            }

            // ── LOAD DATA ───────────────────────────────────────────
            try {
                const response = await fetch(GEOJSON_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const geoData = await response.json();

                // Filter out Antarctica for a cleaner look
                geoData.features = geoData.features.filter(f => {
                    const name = f.properties.NAME || f.properties.name || '';
                    return name !== 'Antarctica';
                });

                // Render GeoJSON on map
                geoJsonLayer = L.geoJson(geoData, {
                    style: function () {
                        return { ...defaultStyle };
                    },
                    onEachFeature: onEachFeature
                }).addTo(map);

                // Set a nice world view
                map.setView([20, 0], 2);

                // Hide loading
                loadingOverlay.style.display = 'none';

            } catch (err) {
                console.error('Erro ao carregar mapa:', err);
                loadingOverlay.innerHTML = `
                    <div class="error-message" style="position:static; background:transparent;">
                        <p>Erro ao carregar o mapa mundial.</p>
                        <p style="font-size:0.8rem; color:#6b7280; margin-top:0.5rem;">${err.message}</p>
                        <button onclick="location.reload()">Tentar novamente</button>
                    </div>
                `;
            }

            // ── RESET ZOOM ──────────────────────────────────────────
            const resetZoomBtn = document.getElementById('reset-zoom-btn');
            resetZoomBtn.addEventListener('click', function () {
                if (selectedLayer) {
                    geoJsonLayer.resetStyle(selectedLayer);
                    selectedLayer = null;
                }
                map.setView([20, 0], 2);
            });

            // ── RESPONSIVE ──────────────────────────────────────────
            window.addEventListener('resize', function () {
                map.invalidateSize();
            });
        });
    </script>
</body>

</html>
