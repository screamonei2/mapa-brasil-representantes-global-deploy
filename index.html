<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Representantes Globais</title>
    <meta name="description" content="Mapa interativo de representantes globais por país">

    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <style>
        /* Remover todos os outlines de focus */
        * {
            outline: none !important;
        }

        button:focus,
        input:focus,
        select:focus,
        textarea:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        body,
        html {
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overflow-x: hidden;
        }

        #representantes-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .grid-container {
            flex: 1;
            display: grid;
            gap: 1rem;
            /* Forçado a 1 coluna já que não temos sidebar neste projeto global */
            grid-template-columns: 1fr;
            min-height: 0;
        }

        .map-container {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .map-wrapper {
            flex: 1;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            padding: 1rem;
            position: relative;
            min-height: 300px;
        }

        #map {
            height: 100%;
            width: 100%;
            border-radius: 0.5rem;
            background-color: #fff;
            min-height: 300px;
        }

        @media (min-width: 768px) {
            #map {
                min-height: 400px;
            }
        }

        @media (min-width: 1024px) {
            #map {
                /* Ajuste de altura considerando o topo e padding */
                min-height: calc(100vh - 150px);
            }
        }

        @media (max-width: 480px) {
            #representantes-container {
                padding: 0.5rem;
            }

            .main-content {
                gap: 0.5rem;
            }

            .map-wrapper {
                padding: 0.5rem;
            }
        }

        .leaflet-interactive {
            transition: fill-opacity 0.2s ease-in-out;
        }

        /* Botão de Reset Zoom */
        .reset-zoom-btn {
            position: absolute;
            bottom: 15px; /* Ajuste para não conflitar com a atribuição do mapa */
            right: 15px;
            z-index: 1000;
            background: white;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-zoom-btn:hover {
            background: #f4f4f4;
            border-color: rgba(0, 0, 0, 0.4);
        }

        .reset-zoom-btn svg {
            width: 18px;
            height: 18px;
            color: #333;
        }

        /* Loading overlay mantido do global anterior para boa UX */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f4f6;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 1rem;
            color: #64748b;
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* Tooltip do Leaflet para os países */
        .country-tooltip {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            box-shadow: none;
        }
        
        .country-tooltip::before {
            border-top-color: rgba(0, 0, 0, 0.8) !important;
        }
    </style>
</head>

<body class="bg-white">

    <div id="representantes-container" class="container mx-auto p-2 sm:p-4 lg:p-6 max-w-7xl">
        <div class="mb-4 lg:mb-6">
            <h1 id="main-title" class="text-xl sm:text-2xl lg:text-3xl font-bold text-gray-800">Representantes Globais</h1>
        </div>

        <div class="main-content">
            <div class="grid-container">
                <!-- Coluna do Mapa -->
                <div class="map-container">
                    <div class="map-wrapper">
                        <div id="map"></div>
                        <button id="reset-zoom-btn" class="reset-zoom-btn" title="Resetar zoom">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
                            </svg>
                        </button>
                        
                        <!-- Loading Overlay -->
                        <div id="loading-overlay" class="loading-overlay">
                            <div class="loading-spinner"></div>
                            <p class="loading-text">Carregando mapa mundial...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {

            // ── CONFIG ──────────────────────────────────────────────
            const GEOJSON_URL = 'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson';

            // ── MAP STYLES ──────────────────────────────────────────
            const defaultStyle = {
                fillColor: '#3b82f6',
                weight: 1,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.7
            };

            const highlightStyle = {
                weight: 0,
                fillOpacity: 0.9
            };

            const selectedStyle = {
                fillColor: '#2563eb', // Um azul um pouco mais sólido para seleção fixa
                weight: 0,
                fillOpacity: 1
            };

            // ── STATE ───────────────────────────────────────────────
            let geoJsonLayer = null;
            let selectedLayer = null;
            const loadingOverlay = document.getElementById('loading-overlay');

            // ── INIT MAP ────────────────────────────────────────────
            const southWest = L.latLng(-85, -180);
            const northEast = L.latLng(85, 180);
            const worldBounds = L.latLngBounds(southWest, northEast);

            const map = L.map('map', {
                center: [20, 0],
                zoom: 2,
                minZoom: 2,
                maxZoom: 8,
                zoomControl: true,
                attributionControl: true,
                worldCopyJump: false,
                maxBounds: worldBounds,
                maxBoundsViscosity: 1.0
            });

            // O mapa original não usa tiles (deixa o fundo puramente branco com CSS background)
            // L.tileLayer removido para igualar o Vercel Deploy.

            // ── HELPERS ─────────────────────────────────────────────
            const ptFallback = {
                'W. Sahara': 'Saara Ocidental', 'Dem. Rep. Congo': 'Rep. Dem. do Congo',
                'Dominican Rep.': 'República Dominicana', 'Falkland Is.': 'Ilhas Malvinas',
                'Fr. S. Antarctic Lands': 'Terras Austrais Francesas',
                'Bosnia and Herz.': 'Bósnia e Herzegovina', 'N. Cyprus': 'Chipre do Norte',
                'Somaliland': 'Somalilândia', 'Kosovo': 'Kosovo', 'S. Sudan': 'Sudão do Sul',
                'Central African Rep.': 'Rep. Centro-Africana', 'Eq. Guinea': 'Guiné Equatorial',
                'eSwatini': 'Eswatini', 'Solomon Is.': 'Ilhas Salomão',
                'N. Korea': 'Coreia do Norte', 'S. Korea': 'Coreia do Sul',
                'United States of America': 'Estados Unidos'
            };

            function getDisplayName(properties) {
                if (properties.NAME_PT) return properties.NAME_PT;
                const name = properties.NAME || properties.name || properties.ADMIN || 'Desconhecido';
                return ptFallback[name] || name;
            }

            function onEachFeature(feature, layer) {
                const name = getDisplayName(feature.properties);

                layer.bindTooltip(name, {
                    sticky: true,
                    className: 'country-tooltip',
                    direction: 'top',
                    offset: [0, -10]
                });

                layer.on({
                    mouseover: function (e) {
                        const l = e.target;
                        if (l !== selectedLayer) {
                            l.setStyle(highlightStyle);
                            l.bringToFront();
                            if (selectedLayer) selectedLayer.bringToFront();
                        }
                    },
                    mouseout: function (e) {
                        const l = e.target;
                        if (l !== selectedLayer) {
                            geoJsonLayer.resetStyle(l);
                        }
                    },
                    click: function (e) {
                        const l = e.target;

                        if (selectedLayer && selectedLayer !== l) {
                            geoJsonLayer.resetStyle(selectedLayer);
                        }

                        if (selectedLayer === l) {
                            geoJsonLayer.resetStyle(l);
                            selectedLayer = null;
                            map.setView([20, 0], 2);
                        } else {
                            selectedLayer = l;
                            l.setStyle(selectedStyle);
                            l.bringToFront();
                            map.fitBounds(l.getBounds(), { padding: [40, 40], maxZoom: 6 });
                        }
                    }
                });
            }

            // ── LOAD DATA ───────────────────────────────────────────
            try {
                const response = await fetch(GEOJSON_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const geoData = await response.json();

                geoData.features = geoData.features.filter(f => {
                    const name = f.properties.NAME || f.properties.name || '';
                    return name !== 'Antarctica';
                });

                geoJsonLayer = L.geoJson(geoData, {
                    style: function () {
                        return { ...defaultStyle };
                    },
                    onEachFeature: onEachFeature
                }).addTo(map);

                map.setView([20, 0], 2);

                loadingOverlay.style.display = 'none';

            } catch (err) {
                console.error('Erro ao carregar mapa:', err);
                loadingOverlay.innerHTML = `<div style="color:red; margin-top:1rem;">Erro ao carregar o mapa.</div>`;
            }

            // ── RESET ZOOM ──────────────────────────────────────────
            const resetZoomBtn = document.getElementById('reset-zoom-btn');
            resetZoomBtn.addEventListener('click', function () {
                if (selectedLayer) {
                    geoJsonLayer.resetStyle(selectedLayer);
                    selectedLayer = null;
                }
                map.setView([20, 0], 2);
            });

            // ── RESPONSIVE ──────────────────────────────────────────
            window.addEventListener('resize', function () {
                map.invalidateSize();
            });
        });
    </script>
</body>

</html>
