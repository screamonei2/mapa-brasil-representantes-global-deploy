<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Representantes Globais</title>
    <meta name="description" content="Mapa interativo de representantes globais por país">

    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <style>
        /* Remover todos os outlines de focus */
        * {
            outline: none !important;
        }

        button:focus,
        input:focus,
        select:focus,
        textarea:focus {
            outline: none !important;
            box-shadow: none !important;
        }

        body,
        html {
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            overflow-x: hidden;
        }

        #representantes-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .grid-container {
            flex: 1;
            display: grid;
            gap: 1rem;
            /* Forçado a 1 coluna já que não temos sidebar neste projeto global */
            grid-template-columns: 1fr;
            min-height: 0;
        }

        .map-container {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .map-wrapper {
            flex: 1;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            padding: 1rem;
            position: relative;
            min-height: 300px;
        }

        #map {
            height: 100%;
            width: 100%;
            border-radius: 0.5rem;
            background-color: #fff;
            min-height: 300px;
        }

        @media (min-width: 768px) {
            #map {
                min-height: 400px;
            }
        }

        @media (min-width: 1024px) {
            #map {
                /* Ajuste de altura considerando o topo e padding */
                min-height: calc(100vh - 150px);
            }
        }

        @media (max-width: 480px) {
            #representantes-container {
                padding: 0.5rem;
            }

            .main-content {
                gap: 0.5rem;
            }

            .map-wrapper {
                padding: 0.5rem;
            }
        }

        .leaflet-interactive {
            transition: fill-opacity 0.2s ease-in-out;
        }

        /* Botão de Reset Zoom */
        .reset-zoom-btn {
            position: absolute;
            bottom: 15px;
            /* Ajuste para não conflitar com a atribuição do mapa */
            right: 15px;
            z-index: 1000;
            background: white;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-zoom-btn:hover {
            background: #f4f4f4;
            border-color: rgba(0, 0, 0, 0.4);
        }

        .reset-zoom-btn svg {
            width: 18px;
            height: 18px;
            color: #333;
        }

        /* Loading overlay mantido do global anterior para boa UX */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f4f6;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 1rem;
            color: #64748b;
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* Tooltip do Leaflet para os países */
        .country-tooltip {
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            box-shadow: none;
        }

        .country-tooltip::before {
            border-top-color: rgba(0, 0, 0, 0.8) !important;
        }
    </style>
</head>

<body class="bg-white">

                                <!-- Cards flutuantes injetados aqui -->
                            </div>

                        <button id="reset-zoom-btn" class="reset-zoom-btn" title="Resetar zoom">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor">

            // ── HELPERS / FUNÇÕES DE DADOS ────────────────────────────
            const latamSubregions = ["South America", "Central America", "Caribbean", "Middle America"];

            function isLatamCountry(feature) {
                const subregion = feature.properties.SUBREGION;
                const nameEn = feature.properties.NAME_EN || feature.properties.NAME || "";

                // Força a inclusão da Guiana Francesa que costuma ser classificada como França/Europa nos mapas
                if (nameEn === "French Guiana" || nameEn === "Fr. Guiana" || nameEn === "Guyane") {
                    return true;
                }

                return latamSubregions.includes(subregion);
            }

            function getRepresentativesForCountry(feature) {
                const nameEn = feature.properties.NAME_EN || feature.properties.NAME;

                if (representantesGlobais[nameEn]) {
                    return representantesGlobais[nameEn];
                }

                // LATAM Fallback (Regiões da América Latina que costumam cair no fallback se não estiverem explícitos)
                return isLatamCountry(feature) ? fallbackLATAM : fallbackGlobal;
            }

            // ── UI LOGIC / PAINEL FLUTUANTE ───────────────────────────
            const floatingPanel = document.getElementById('floating-panel');
            const closePanelBtn = document.getElementById('close-panel-btn');
            const panelTitle = document.getElementById('panel-title');
            const panelContent = document.getElementById('panel-content');

            function closeFloatingPanel() {
                floatingPanel.classList.add('hidden');
                floatingPanel.classList.remove('flex');
            }

            closePanelBtn.addEventListener('click', closeFloatingPanel);

            function renderBrazilCTA() {
                panelTitle.textContent = "Brasil";
                panelContent.innerHTML = `
                    <div class="result-item bg-white border border-gray-100 rounded-xl p-6 shadow-md transition-shadow">
                        <div class="text-green-600 mb-4 flex justify-center"><i data-lucide="map" class="w-12 h-12"></i></div>
                        <div class="font-bold text-gray-800 text-xl mb-3 text-center">Nossa Sede Central</div>
                        <p class="text-sm text-gray-600 mb-6 text-center leading-relaxed">Acesse a nossa página principal para encontrar e pesquisar representantes e distribuidores locais exclusivos no Brasil.</p>
                        <a href="../vercel-deploy/index.html" class="block w-full text-center bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow-sm">
                            Acessar Mapa do Brasil
                        </a>
                    </div>
                `;
                if (window.lucide) window.lucide.createIcons();
                floatingPanel.classList.remove('hidden');
                floatingPanel.classList.add('flex');
            }

            function renderCards(countryName, reps) {
                panelTitle.textContent = countryName;

                panelContent.innerHTML = reps.map((item, index) => {
                    let telefonesHtml = '';
                    if (item.Telefones && item.Telefones.length > 0) {
                        telefonesHtml = `<div class="flex flex-wrap gap-1 items-center">
                            ${item.Telefones.map(tel => `<a href="tel:${tel.replace(/[^0-9+]/g, '')}" class="text-blue-600 hover:underline inline-block font-medium">${tel}</a>`).join('<span class="text-gray-300 mx-1.5">•</span>')}
                        </div>`;
                    }

                    return `
                        <div class="result-item bg-white/95 backdrop-blur-sm border border-gray-100/50 rounded-xl p-4 shadow-md hover:shadow-lg transition-all relative overflow-hidden">
                            <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                            <div class="font-bold text-blue-900 text-[1.05rem] mb-2.5 leading-tight">${item.NomeRepresentante}</div>
                            <div class="space-y-2.5">
                                ${item.Tipo ? `<div class="text-gray-700 text-sm flex items-center gap-2.5"><i data-lucide="tag" class="w-4 h-4 text-blue-500/70"></i> <span class="font-medium">${item.Tipo}</span></div>` : ''}
                                ${item.Contato ? `<div class="text-gray-700 text-sm flex items-center gap-2.5"><i data-lucide="user" class="w-4 h-4 text-blue-500/70"></i> <span>${item.Contato}</span></div>` : ''}
                                ${item.Endereco ? `<div class="text-gray-700 text-sm flex items-start gap-2.5"><i data-lucide="map-pin" class="w-4 h-4 text-blue-500/70 mt-0.5 shrink-0"></i> <span class="leading-snug">${item.Endereco}</span></div>` : ''}
                                ${item.email ? `<div class="text-gray-700 text-sm flex items-center gap-2.5"><i data-lucide="mail" class="w-4 h-4 text-blue-500/70"></i> <a href="mailto:${item.email}" class="text-blue-600 hover:underline break-all">${item.email}</a></div>` : ''}
                                ${item.Site ? `<div class="text-gray-700 text-sm flex items-center gap-2.5"><i data-lucide="globe" class="w-4 h-4 text-blue-500/70"></i> <a href="http://${item.Site.replace(/^https?:\/\//, '')}" target="_blank" class="text-blue-600 hover:underline break-all">${item.Site}</a></div>` : ''}
                            </div>
                            ${telefonesHtml ? `<div class="text-gray-700 text-sm mt-3 pt-3 border-t border-gray-100 flex items-start gap-2.5 bg-gray-50/50 -mx-4 px-4 -mb-4 pb-3"><i data-lucide="phone" class="w-4 h-4 text-blue-500/70 mt-0.5 shrink-0"></i> <div class="flex-1">${telefonesHtml}</div></div>` : ''}
                        </div>
                    `;
                }).join('');

                // Inicializa ícones recém-criados e abre o painel
                if (window.lucide) window.lucide.createIcons();
                floatingPanel.classList.remove('hidden');
                floatingPanel.classList.add('flex');

            // ── MAP STYLES ──────────────────────────────────────────
            const defaultStyle = {
                fillColor: '#3b82f6',
                weight: 1,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.7
            };

            const disabledStyle = {
                fillColor: '#cbd5e1',
                weight: 1,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.4
            };

            const highlightStyle = {
                weight: 0,
                fillOpacity: 0.9
            };

            const selectedStyle = {
                fillColor: '#2563eb', // Um azul um pouco mais sólido para seleção fixa
                weight: 0,
                fillOpacity: 1
            };

            // ── STATE ───────────────────────────────────────────────
            let geoJsonLayer;
            let selectedLayer = null;
            const loadingOverlay = document.getElementById('loading-overlay');

            // ── INIT MAP ────────────────────────────────────────────
            const map = L.map('map', {
                center: [20, 0],
                zoom: 2,
                minZoom: 2,
                maxBounds: [

                    [90, 180]
                ],
                maxBoundsViscosity: 1.0
            });

            // O mapa original não usa tiles (deixa o fundo puramente branco com CSS background)
            // L.tileLayer removido para igualar o Vercel Deploy.

            // ── HELPERS ─────────────────────────────────────────────
            const ptFallback = {
                "United States of America": "Estados Unidos",
                "Russia": "Rússia",
                "W. Sahara": "Saara Ocidental",
                "Dem. Rep. Congo": "R.D. Congo",
                "Central African Rep.": "Rep. Centro-Africana",
                "S. Sudan": "Sudão do Sul",
                "Dominican Rep.": "Rep. Dominicana",
                "Falkland Is.": "Ilhas Falkland",
                "Greenland": "Groenlândia",
                "Eq. Guinea": "Guiné Equatorial",
                "eSwatini": "Eswatini"
            };

            function getCountryName(feature) {
                const props = feature.properties;
                const nameEn = props.NAME_EN || props.NAME;
                // Usar NAME_PT se disponível e não vazio ou fallback manual
                if (props.NAME_PT && props.NAME_PT.trim() !== '') {
                    return props.NAME_PT;
                }
                return ptFallback[nameEn] || nameEn;
            }

            function onEachFeature(feature, layer) {
                const countryName = getCountryName(feature);

                // Tooltip para países válidos
                layer.bindTooltip(`
                    <div class="font-semibold text-gray-800">${countryName}</div>
                    <div class="text-xs text-gray-500 mt-1">Clique para maiores detalhes</div>
                `, {
                    sticky: true,
                    className: 'custom-tooltip',
                    direction: 'auto'
                });

                layer.on({
                    mouseover: function (e) {
                        const layer = e.target;
                        layer.setStyle(highlightStyle);
                        if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                            layer.bringToFront();
                        }
                    },
                    mouseout: function (e) {
                        const layer = e.target;
                        if (layer !== selectedLayer) {
                            geoJsonLayer.resetStyle(layer); // Leaflet automaticamente aplica o return da style fn
                        } else {
                            layer.setStyle(selectedStyle);
                        }
                    },
                    click: function (e) {
                        try { map.closeTooltip(); } catch (err) { }

                        if (selectedLayer) {
                            geoJsonLayer.resetStyle(selectedLayer);
                        }
                        selectedLayer = e.target;
                        selectedLayer.setStyle(selectedStyle);

                        if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                            selectedLayer.bringToFront();
                        }

                        // Calcular os limites com um pouco de padding para a direita pra acomodar os cards flutuantes
                        map.fitBounds(e.target.getBounds(), {
                            paddingBottomRight: [340, 0], // Move center left to fit right-side cards
                            maxZoom: 5,
                            animate: true
                        });

                        const nameEn = feature.properties.NAME_EN || feature.properties.NAME;
                        const countryName = getCountryName(feature);

                        if (nameEn === "Brazil") {
                            renderBrazilCTA();
                        } else {
                            const reps = getRepresentativesForCountry(feature);
                            renderCards(countryName, reps);
                        }
                    }
                });
            }

            // ── LOAD DATA ───────────────────────────────────────────
            try {
                const response = await fetch(GEOJSON_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const geoData = await response.json();

                geoData.features = geoData.features.filter(f => {
                    const name = f.properties.NAME || f.properties.name || '';
                    return name !== 'Antarctica';
                });

                // --- HACK PARA GUIANA FRANCESA ---
                // Nos dados ne_110m_admin_0_countries, a Guiana Francesa vem colada com a França (mesmo MultiPolygon),
                // o que a deixa cinza (Europa) em vez de azul (LATAM). Vamos separá-la em uma feature própria.
                const frIndex = geoData.features.findIndex(f => f.properties.NAME_EN === 'France' || f.properties.NAME === 'France');
                if (frIndex !== -1 && geoData.features[frIndex].geometry.type === 'MultiPolygon') {
                    const franceFeat = geoData.features[frIndex];
                    // A Guiana Francesa está na América do Sul: aprox. lon -55 a -50 e lat 2 a 6
                    const polyIndex = franceFeat.geometry.coordinates.findIndex(poly => {
                        const lon = poly[0][0][0]; // Pega a longitude do primeiro ponto do polígono
                        return lon < -45 && lon > -60;
                    });

                    if (polyIndex !== -1) {
                        // Extrai o polígono da França
                        const gfPolygon = franceFeat.geometry.coordinates.splice(polyIndex, 1)[0];

                        // Cria a nova feature independente
                        geoData.features.push({
                            type: 'Feature',
                            properties: {
                                ...franceFeat.properties,
                                NAME: 'French Guiana',
                                NAME_EN: 'French Guiana',
                                NAME_PT: 'Guiana Francesa',
                                SUBREGION: 'South America',
                                REGION_UN: 'Americas'
                            },
                            geometry: {
                                type: 'Polygon',
                                coordinates: gfPolygon
                            }
                        });

                        // O Leaflet re-avalia o type. Se a França ficar com 1 polígono, tecnicamente deve rodar, mas para segurança ignoramos se precisar.
                    }
                }
                // ----------------------------------

                geoJsonLayer = L.geoJson(geoData, {
                    style: function (feature) {
                        return defaultStyle;
                    },
                    onEachFeature: onEachFeature
                }).addTo(map);

                map.setView([20, 0], 2);

                loadingOverlay.style.display = 'none';

            } catch (err) {
                console.error('Erro ao carregar mapa:', err);
                loadingOverlay.innerHTML = `<div style="color:red; margin-top:1rem;">Erro ao carregar o mapa.</div>`;
            }

            // ── RESET ZOOM ──────────────────────────────────────────
            const resetZoomBtn = document.getElementById('reset-zoom-btn');
            resetZoomBtn.addEventListener('click', function () {
                if (selectedLayer) {
                    geoJsonLayer.resetStyle(selectedLayer);
                    selectedLayer = null;
                }
                map.setView([20, 0], 2);
                closeFloatingPanel(); // Fechar os cards ao resetar a visão
            });

            // ── RESPONSIVE ──────────────────────────────────────────
            window.addEventListener('resize', function () {
                map.invalidateSize();
            });
        });
    </script>
</body>
